<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ober CRM - Tareas</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="header-logo">
            <span class="logo-icon"><i class="fas fa-building"></i></span>
            <span class="logo-text">Ober CRM</span>
        </div>
        <div class="header-actions">
            <button class="btn-notification"><i class="fas fa-bell"></i></button>
            <button class="btn-profile"><i class="fas fa-user-circle"></i></button>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-user">
            <img src="https://ui-avatars.com/api/?name=Ober&background=1a3a5c&color=fff&size=60" alt="Ober">
            <div class="user-info">
                <h4>Ober</h4>
                <span>Agente Inmobiliario</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="leads.html"><i class="fas fa-users"></i> Leads</a></li>
            <li><a href="propiedades.html"><i class="fas fa-home"></i> Propiedades</a></li>
            <li><a href="pipeline.html"><i class="fas fa-route"></i> Pipeline</a></li>
            <li class="active"><a href="tareas.html"><i class="fas fa-tasks"></i> Tareas</a></li>
            <li><a href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a></li>
            <li><a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn-logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-tasks"></i> Tareas</h1>
            <button class="btn-primary" id="addTaskBtn"><i class="fas fa-plus"></i> Nueva Tarea</button>
        </div>

        <!-- Filtros -->
        <div class="filters-bar">
            <select class="filter-select" id="taskFilter">
                <option value="all">Todas</option>
                <option value="pendiente">Pendientes</option>
                <option value="completada">Completadas</option>
                <option value="hoy">Hoy</option>
                <option value="semana">Esta semana</option>
            </select>
        </div>

        <!-- Lista de Tareas -->
        <div class="tasks-list" id="tasksList">
            <!-- Se carga dinámicamente -->
        </div>

        <!-- Modal Nueva Tarea -->
        <div class="modal" id="taskModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Nueva Tarea</h3>
                    <button class="modal-close" id="closeTaskModal">&times;</button>
                </div>
                <form id="taskForm">
                    <div class="form-group">
                        <label>Tarea *</label>
                        <input type="text" id="taskTitle" required placeholder="Ej: Llamar a cliente">
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="taskDesc" rows="2" placeholder="Detalles..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Fecha *</label>
                            <input type="date" id="taskDate" required>
                        </div>
                        <div class="form-group">
                            <label>Hora</label>
                            <input type="time" id="taskTime">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Prioridad</label>
                        <select id="taskPriority">
                            <option value="alta">Alta</option>
                            <option value="media" selected>Media</option>
                            <option value="baja">Baja</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary btn-full">Guardar Tarea</button>
                </form>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="leads.html"><i class="fas fa-users"></i><span>Leads</span></a>
        <a href="propiedades.html"><i class="fas fa-home"></i><span>Propiedades</span></a>
        <a href="pipeline.html"><i class="fas fa-route"></i><span>Pipeline</span></a>
        <a href="tareas.html" class="active"><i class="fas fa-tasks"></i><span>Tareas</span></a>
    </nav>

    <script src="js/app.js"></script>
    <script src="js/tareas.js"></script>
</body>
</html>
