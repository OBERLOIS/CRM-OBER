<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ober CRM - Leads</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="header-logo">
            <span class="logo-icon"><i class="fas fa-building"></i></span>
            <span class="logo-text">Ober CRM</span>
        </div>
        <div class="header-actions">
            <button class="btn-notification"><i class="fas fa-bell"></i></button>
            <button class="btn-profile"><i class="fas fa-user-circle"></i></button>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-user">
            <img src="https://ui-avatars.com/api/?name=Ober&background=1a3a5c&color=fff&size=60" alt="Ober">
            <div class="user-info">
                <h4>Ober</h4>
                <span>Agente Inmobiliario</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li class="active"><a href="leads.html"><i class="fas fa-users"></i> Leads</a></li>
            <li><a href="propiedades.html"><i class="fas fa-home"></i> Propiedades</a></li>
            <li><a href="pipeline.html"><i class="fas fa-route"></i> Pipeline</a></li>
            <li><a href="tareas.html"><i class="fas fa-tasks"></i> Tareas</a></li>
            <li><a href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a></li>
            <li><a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn-logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-users"></i> Leads</h1>
            <button class="btn-primary" id="addLeadBtn"><i class="fas fa-plus"></i> Nuevo Lead</button>
        </div>

        <!-- Filtros -->
        <div class="filters-bar">
            <input type="text" class="search-input" id="searchLead" placeholder="🔍 Buscar lead...">
            <select class="filter-select" id="filterStage">
                <option value="all">Todas las etapas</option>
                <option value="nuevo">Nuevo</option>
                <option value="contacto">Contacto inicial</option>
                <option value="visita">Visita programada</option>
                <option value="negociacion">Negociación</option>
                <option value="oferta">Oferta recibida</option>
                <option value="cierre">Cierre</option>
                <option value="postventa">Post-venta</option>
            </select>
            <select class="filter-select" id="filterInteres">
                <option value="all">Todos los intereses</option>
                <option value="venta-casa">Venta - Casa</option>
                <option value="venta-depto">Venta - Departamento</option>
                <option value="alquiler-casa">Alquiler - Casa</option>
                <option value="alquiler-depto">Alquiler - Departamento</option>
                <option value="terreno">Terreno</option>
                <option value="local">Local comercial</option>
                <option value="proyecto">Proyecto nuevo</option>
            </select>
        </div>

        <!-- Lista de Leads -->
        <div class="leads-grid" id="leadsGrid">
            <!-- Los leads se cargan dinámicamente -->
        </div>

        <!-- Modal Nuevo Lead -->
        <div class="modal" id="leadModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Nuevo Lead</h3>
                    <button class="modal-close" id="closeModal">&times;</button>
                </div>
                <form id="leadForm">
                    <div class="form-group">
                        <label>Nombre completo *</label>
                        <input type="text" id="leadNombre" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Teléfono *</label>
                            <input type="tel" id="leadTelefono" required placeholder="+56 9 1234 5678">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="leadEmail" placeholder="juan@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Interés *</label>
                        <select id="leadInteres" required>
                            <option value="">Seleccionar...</option>
                            <option value="venta-casa">Venta - Casa</option>
                            <option value="venta-depto">Venta - Departamento</option>
                            <option value="alquiler-casa">Alquiler - Casa</option>
                            <option value="alquiler-depto">Alquiler - Departamento</option>
                            <option value="terreno">Terreno</option>
                            <option value="local">Local comercial</option>
                            <option value="proyecto">Proyecto nuevo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Etapa</label>
                        <select id="leadStage">
                            <option value="nuevo">Nuevo</option>
                            <option value="contacto">Contacto inicial</option>
                            <option value="visita">Visita programada</option>
                            <option value="negociacion">Negociación</option>
                            <option value="oferta">Oferta recibida</option>
                            <option value="cierre">Cierre</option>
                            <option value="postventa">Post-venta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Notas</label>
                        <textarea id="leadNotas" rows="3" placeholder="Comentarios adicionales..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary btn-full">Guardar Lead</button>
                </form>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="leads.html" class="active"><i class="fas fa-users"></i><span>Leads</span></a>
        <a href="propiedades.html"><i class="fas fa-home"></i><span>Propiedades</span></a>
        <a href="pipeline.html"><i class="fas fa-route"></i><span>Pipeline</span></a>
        <a href="tareas.html"><i class="fas fa-tasks"></i><span>Tareas</span></a>
    </nav>

    <script src="js/app.js"></script>
    <script src="js/leads.js"></script>
</body>
</html>
